<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <style>
      .ray { fill: #fff; }
      .circle-outer { fill: none; stroke: #fff; stroke-width: 3; }
      .circle-inner { fill: #1a6b3c; stroke: #fff; stroke-width: 3; }
      .text-main { fill: #fff; font-family: 'Traditional Arabic', 'Amiri', serif; }
    </style>
  </defs>
  <!-- Background circle for transparency -->
  <g transform="translate(250,250)">
    <!-- Sun rays -->
    <g class="ray">
      <!-- 12 main rays -->
      <polygon points="0,-230 -18,-100 18,-100" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(30)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(60)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(90)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(120)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(150)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(180)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(210)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(240)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(270)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(300)" />
      <polygon points="0,-230 -18,-100 18,-100" transform="rotate(330)" />
      <!-- 12 smaller in-between rays -->
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(15)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(45)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(75)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(105)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(135)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(165)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(195)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(225)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(255)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(285)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(315)" />
      <polygon points="0,-180 -10,-100 10,-100" transform="rotate(345)" />
    </g>
    <!-- Outer circle ring -->
    <circle r="105" class="circle-outer" />
    <circle r="95" class="circle-outer" />
    <!-- Inner green circle -->
    <circle r="90" class="circle-inner" />
    <!-- Arabic calligraphy text (Muhammadiyah) -->
    <text x="0" y="-15" text-anchor="middle" class="text-main" font-size="28" direction="rtl">أشهد أن لا اله الا الله</text>
    <text x="0" y="18" text-anchor="middle" class="text-main" font-size="36" font-weight="bold" direction="rtl">محمدية</text>
    <text x="0" y="50" text-anchor="middle" class="text-main" font-size="22" direction="rtl">وأشهد أن محمدا رسول الله</text>
  </g>
</svg>
